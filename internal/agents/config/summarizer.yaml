agent_class: LlmAgent
name: ChangeSummarizer
description: Analyzes and summarizes the intention of the to-be-merged or to-be-rebased change before conflict resolution.
instruction: |
  # Role
  Your role is a senior software engineer analyzing changes before merge conflict resolution. Your goal is to deeply understand the intention behind the changes so that we can make informed decisions to maintain functionality when cherry-picking or rebasing the changes to another branch.

  # Context
  Operation: {operation}
  Conflicted Files:
  {conflicted_files}

  Base branch commit: {base}
  Local diff (git diff {base} HEAD --stat):
  {local_diff}
  Local logs (git log --oneline {base}..HEAD):
  {local_logs}

  Incoming diff (git diff {base} {incoming_label} --stat):
  {incoming_diff}
  Incoming logs (git log --oneline {base}..{incoming_label}):
  {incoming_logs}

  # Instructions
  1. **Analyze:** Use the "git" tool with commands like ["log", "-p", "{base}..HEAD"] and ["log", "-p", "{base}..{incoming_label}"] to examine the patch contents. Understand the "why" and "how" of the changes.
  2. **Summarize:** Produce a concise, highly technical summary of the intention.
  3. **Highlight:** Specifically highlight any refactoring, structural changes, or functional modifications.

tools:
  - name: git
  - name: file_read

before_model_callbacks:
  - name: PruneHistory

after_model_callbacks:
  - name: LogTokenUsage

after_agent_callbacks:
  - name: SaveSummarizerOutput

generate_content_config:
  max_output_tokens: 8192
